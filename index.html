<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>停管專案績效總覽</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--border:rgba(255,255,255,0.07);--text:#e8edf5;--muted:#6b7a96;--accent:#3b82f6;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--font-mono:'DM Mono',monospace;--font:'Noto Sans TC',sans-serif; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding:24px;}
  .header{display:flex;align-items:baseline;gap:16px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:16px;flex-wrap:wrap;}
  .header h1{font-size:18px;font-weight:700;}
  .header .sub{font-size:12px;color:var(--muted);font-family:var(--font-mono);}
  .badge{font-size:11px;font-family:var(--font-mono);color:var(--accent);border:1px solid var(--accent);border-radius:4px;padding:3px 8px;margin-left:auto;}
  .loading{text-align:center;padding:60px;color:var(--muted);font-family:var(--font-mono);font-size:14px;}
  .spinner{font-size:28px;animation:spin 1s linear infinite;display:inline-block;margin-bottom:12px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .error-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:16px;color:var(--red);font-size:13px;margin-bottom:20px;}
  .controls{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
  .controls label{font-size:12px;color:var(--muted);}
  .day-select{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-family:var(--font-mono);font-size:13px;cursor:pointer;}
  .day-select:focus{outline:none;border-color:var(--accent);}
  .weather-banner{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
  .weather-banner .wlabel{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-family:var(--font-mono);flex-shrink:0;line-height:1.5;}
  .weather-venues{display:flex;gap:24px;flex-wrap:wrap;flex:1;}
  .weather-item{display:flex;flex-direction:column;gap:4px;}
  .weather-item .vname{font-size:10px;color:var(--muted);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:1px;}
  .weather-segments{display:flex;gap:2px;align-items:flex-end;}
  .seg{display:flex;flex-direction:column;align-items:center;gap:2px;}
  .seg-label{font-size:9px;color:var(--muted);font-family:var(--font-mono);}
  .seg-icon{font-size:20px;line-height:1;}
  .seg-arrow{font-size:10px;color:var(--muted);padding:0 2px;padding-bottom:5px;}
  .weather-note{font-size:11px;display:flex;align-items:center;gap:5px;font-family:var(--font-mono);margin-left:auto;padding:4px 10px;border-radius:6px;white-space:nowrap;}
  .weather-note.good{color:var(--green);background:rgba(16,185,129,0.1);}
  .weather-note.ok{color:var(--muted);background:rgba(255,255,255,0.04);}
  .weather-note.warn{color:var(--amber);background:rgba(245,158,11,0.1);}
  .weather-note.bad{color:var(--red);background:rgba(239,68,68,0.1);}
  .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
  @media(max-width:600px){.summary-grid,.venues{grid-template-columns:1fr;}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;position:relative;overflow:hidden;}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .card.pass::before{background:var(--green);}.card.fail::before{background:var(--red);}
  .card-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-family:var(--font-mono);}
  .card-value{font-size:30px;font-weight:700;font-family:var(--font-mono);letter-spacing:-1px;}
  .card-value.pass{color:var(--green);}.card-value.fail{color:var(--red);}
  .card-meta{font-size:11px;color:var(--muted);margin-top:4px;}
  .card-meta .up{color:var(--green);}.card-meta .down{color:var(--red);}
  .diff-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-family:var(--font-mono);font-weight:500;margin-top:8px;}
  .diff-badge.pass{background:rgba(16,185,129,0.12);color:var(--green);}
  .diff-badge.fail{background:rgba(239,68,68,0.12);color:var(--red);}
  .venues{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
  .venue{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden;}
  .venue::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .venue.pass::before{background:var(--green);}.venue.fail::before{background:var(--red);}
  .venue-name{font-size:13px;font-weight:700;letter-spacing:1px;margin-bottom:3px;text-transform:uppercase;font-family:var(--font-mono);}
  .venue-type{font-size:11px;color:var(--muted);margin-bottom:14px;}
  .perf-value{font-size:36px;font-weight:700;font-family:var(--font-mono);letter-spacing:-1px;margin-bottom:4px;}
  .perf-value.pass{color:var(--green);}.perf-value.fail{color:var(--red);}
  .target-row{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);}
  .target-row span:last-child{font-family:var(--font-mono);}
  .venue-weather{display:flex;align-items:center;gap:5px;margin-top:10px;font-size:11px;color:var(--muted);font-family:var(--font-mono);flex-wrap:wrap;}
  .venue-weather .wi{font-size:15px;}
  .weather-impact{font-size:11px;margin-top:6px;padding:4px 8px;border-radius:4px;}
  .weather-impact.warn{color:var(--amber);background:rgba(245,158,11,0.08);}
  .weather-impact.bad{color:var(--red);background:rgba(239,68,68,0.08);}
  .chart-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px;}
  .chart-title{font-size:13px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
  .chart-title .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
  .tab-bar{display:flex;gap:4px;margin-bottom:16px;}
  .tab{padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--muted);background:transparent;border:1px solid transparent;font-family:var(--font);transition:all 0.2s;}
  .tab.active{color:var(--accent);background:rgba(59,130,246,0.1);border-color:rgba(59,130,246,0.3);}
  .tab:hover:not(.active){background:var(--surface2);}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
  .bar-date{font-size:11px;font-family:var(--font-mono);color:var(--muted);width:32px;flex-shrink:0;}
  .bar-wi{font-size:14px;width:18px;flex-shrink:0;text-align:center;}
  .bar-wrap{flex:1;height:20px;background:var(--surface2);border-radius:3px;overflow:hidden;position:relative;}
  .bar-fill{height:100%;border-radius:3px;transition:width 0.6s cubic-bezier(.4,0,.2,1);}
  .bar-fill.pass{background:linear-gradient(90deg,#059669,#10b981);}
  .bar-fill.fail{background:linear-gradient(90deg,#b91c1c,#ef4444);}
  .bar-target-line{position:absolute;top:0;bottom:0;width:2px;background:rgba(251,191,36,0.7);}
  .bar-val{font-size:11px;font-family:var(--font-mono);width:68px;text-align:right;flex-shrink:0;color:var(--muted);}
  .legend{display:flex;gap:16px;font-size:11px;color:var(--muted);align-items:center;margin-top:10px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:5px;}
  .legend-dot{width:10px;height:10px;border-radius:2px;}
</style>
</head>
<body>
<div class="header">
  <h1>停管專案績效總覽</h1>
  <span class="sub">雙和・中友・南區</span>
  <span class="badge" id="lastUpdate">載入中...</span>
</div>
<div id="loadingArea" class="loading"><div class="spinner">⟳</div><br>資料載入中...</div>
<div id="mainContent" style="display:none">
  <div class="controls">
    <label>查看日期：</label>
    <select class="day-select" id="daySelect" onchange="renderDay()"></select>
  </div>
  <div class="weather-banner" id="weatherBanner"></div>
  <div class="summary-grid" id="summaryCards"></div>
  <div class="venues" id="venueBlocks"></div>
  <div class="chart-section">
    <div class="chart-title"><div class="dot"></div>月度績效趨勢（含天氣）</div>
    <div class="tab-bar">
      <button class="tab active" onclick="switchTab('雙和',this)">雙和</button>
      <button class="tab" onclick="switchTab('中友',this)">中友</button>
      <button class="tab" onclick="switchTab('南區',this)">南區</button>
    </div>
    <div id="trendChart"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>達標</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>未達標</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(251,191,36,0.7);height:2px;width:16px;border-radius:0"></div>目標線</div>
      <div class="legend-item" style="margin-left:4px">圖示為早段天氣：☀️晴 ⛅陰 🌧️雨 ⛈️大雨</div>
    </div>
  </div>
</div>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbwiGSf4FajeelfoaqU6NrnOl-_LlWLp5JWGT6C6uulJfvBim57lZiJa-PvrTanhiVJV/exec';
let allData={},allDates=[],currentTab='雙和';
function wIcon(w){if(!w)return'';if(w.includes('大雨'))return'⛈️';if(w.includes('雨'))return'🌧️';if(w.includes('陰'))return'⛅';if(w.includes('晴'))return'☀️';return'🌡️';}
function wScore(w){return w.split('/').reduce((s,x)=>{if(x.includes('大雨'))return s+3;if(x.includes('雨'))return s+2;if(x.includes('陰'))return s+1;return s;},0);}
function wNote(s){if(s===0)return{text:'晴天，利於開單',cls:'good'};if(s<=2)return{text:'部分時段降雨，績效略受影響',cls:'warn'};if(s<=4)return{text:'多時段降雨，預計影響績效',cls:'warn'};return{text:'全日惡劣天氣，績效明顯受影響',cls:'bad'};}
function fmt(n){return n>=10000?(n/10000).toFixed(1)+'萬':Number(n).toLocaleString();}
function fmtFull(n){return Number(n).toLocaleString();}
async function loadData(){
  try{
    const res=await fetch(API_URL);
    const json=await res.json();
    if(!json.success)throw new Error('API回傳失敗');
    allData={};
    json.data.forEach(row=>{if(!allData[row.venue])allData[row.venue]=[];allData[row.venue].push(row);});
    const venues=Object.keys(allData);
    if(!venues.length)throw new Error('沒有資料');
    allDates=allData[venues[0]].map(d=>d.date);
    document.getElementById('lastUpdate').textContent='最後更新：'+(json.updatedAt||'');
    const sel=document.getElementById('daySelect');
    sel.innerHTML='';
    allDates.forEach(d=>{
      const isH=allData[venues[0]].find(r=>r.date===d)?.isHoliday;
      const opt=document.createElement('option');
      opt.value=d;opt.text=d+(isH?' (假日)':' (平日)');
      sel.appendChild(opt);
    });
    sel.value=allDates[allDates.length-1];
    document.getElementById('loadingArea').style.display='none';
    document.getElementById('mainContent').style.display='block';
    renderDay();renderChart();
  }catch(e){
    document.getElementById('loadingArea').innerHTML='<div class="error-box">⚠ 資料載入失敗：'+e.message+'<br><small>請確認 API 已正確部署，或重新整理頁面</small></div>';
  }
}
function renderDay(){
  const day=document.getElementById('daySelect').value;
  const venues=['雙和','中友','南區'];
  const wb=document.getElementById('weatherBanner');
  let wHtml=`<div class="wlabel">天氣狀況<br>早／午／晚</div><div class="weather-venues">`;
  let totalScore=0;
  venues.forEach(v=>{
    const e=allData[v]?.find(d=>d.date===day);
    const w=e?e.weather:'';
    const p=w.split('/'),am=p[0]||'',noon=p[1]||'',pm=p[2]||'';
    totalScore+=wScore(w);
    wHtml+=`<div class="weather-item"><div class="vname">${v}</div><div class="weather-segments"><div class="seg"><div class="seg-label">早</div><div class="seg-icon">${wIcon(am)}</div></div><div class="seg-arrow">›</div><div class="seg"><div class="seg-label">午</div><div class="seg-icon">${wIcon(noon)}</div></div><div class="seg-arrow">›</div><div class="seg"><div class="seg-label">晚</div><div class="seg-icon">${wIcon(pm)}</div></div></div></div>`;
  });
  const note=wNote(Math.round(totalScore/3));
  wHtml+=`</div><div class="weather-note ${note.cls}">⚑ ${note.text}</div>`;
  wb.innerHTML=wHtml;
  const cards=document.getElementById('summaryCards');
  cards.innerHTML='';
  venues.forEach(v=>{
    const e=allData[v]?.find(d=>d.date===day);if(!e)return;
    const pass=e.total>=e.target;
    cards.innerHTML+=`<div class="card ${pass?'pass':'fail'}"><div class="card-label">${v}場</div><div class="card-value ${pass?'pass':'fail'}">${fmt(e.total)}</div><div class="card-meta">目標 ${fmt(e.target)} · <span class="${pass?'up':'down'}">${e.rate}%</span></div><div class="diff-badge ${pass?'pass':'fail'}">${pass?'▲':'▼'} ${Math.abs(e.diff).toLocaleString()}</div></div>`;
  });
  const vb=document.getElementById('venueBlocks');
  vb.innerHTML='';
  venues.forEach(v=>{
    const e=allData[v]?.find(d=>d.date===day);if(!e)return;
    const pass=e.total>=e.target;
    const p=e.weather.split('/'),am=p[0]||'',noon=p[1]||'',pm=p[2]||'';
    const score=wScore(e.weather),note=wNote(score);
    const impact=score>=3?`<div class="weather-impact ${note.cls}">⚠ ${note.text}</div>`:'';
    vb.innerHTML+=`<div class="venue ${pass?'pass':'fail'}"><div class="venue-name">${v}場</div><div class="venue-type">${day} · ${e.isHoliday?'假日':'平日'} · 目標 ${fmtFull(e.target)}</div><div class="perf-value ${pass?'pass':'fail'}">${fmtFull(e.total)}</div><div class="diff-badge ${pass?'pass':'fail'}" style="margin-top:6px">${pass?'超標 +':'差距 -'}${Math.abs(e.diff).toLocaleString()} 格</div><div class="venue-weather"><span class="wi">${wIcon(am)}</span><span>${am}</span><span style="opacity:.3">›</span><span class="wi">${wIcon(noon)}</span><span>${noon}</span><span style="opacity:.3">›</span><span class="wi">${wIcon(pm)}</span><span>${pm}</span></div>${impact}<div class="target-row"><span>達成率</span><span>${e.rate}%</span></div></div>`;
  });
}
function switchTab(name,btn){currentTab=name;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');renderChart();}
function renderChart(){
  const days=allData[currentTab]||[];if(!days.length)return;
  const maxVal=Math.max(...days.map(d=>d.total));
  const chart=document.getElementById('trendChart');chart.innerHTML='';
  days.forEach(d=>{
    const pass=d.total>=d.target;
    const pct=(d.total/maxVal*100).toFixed(1),tpct=(d.target/maxVal*100).toFixed(1);
    const am=d.weather.split('/')[0]||'';
    chart.innerHTML+=`<div class="bar-row"><div class="bar-date">${d.date}</div><div class="bar-wi" title="${d.weather}">${wIcon(am)}</div><div class="bar-wrap"><div class="bar-fill ${pass?'pass':'fail'}" style="width:${pct}%"></div><div class="bar-target-line" style="left:${tpct}%"></div></div><div class="bar-val">${fmtFull(d.total)}</div></div>`;
  });
}
loadData();
</script>
</body>
</html>
